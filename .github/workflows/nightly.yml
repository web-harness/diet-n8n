name: Nightly

on:
  workflow_dispatch:
  push:
    branches: [main]
  schedule:
    # Sundays 06:00 UTC
    - cron: "0 6 * * 0"

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  NODE_VERSION: "24"
  PYTHON_VERSION: "3.12"

jobs:
  build:
    name: build (${{ matrix.slug }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120
    strategy:
      fail-fast: true
      matrix:
        include:
          - runner: ubuntu-latest
            diet_target: linux-x64
            slug: linux-x64
          - runner: ubuntu-24.04-arm
            diet_target: linux-arm64
            slug: linux-arm64
          - runner: windows-latest
            diet_target: win-x64
            slug: win-x64
          - runner: macos-26-intel
            diet_target: mac-x64
            slug: mac-x64
          - runner: macos-latest
            diet_target: mac-arm64
            slug: mac-arm64
    env:
      DIET_TARGET: ${{ matrix.diet_target }}
      DIET_N8N_PYTHON_BIN: ${{ matrix.runner == 'windows-latest' && 'python' || 'python3' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: false

      - name: Install Python distutils for node-gyp
        shell: bash
        run: "$DIET_N8N_PYTHON_BIN -m pip install setuptools"

      - name: Install build tools (ARM Linux)
        if: matrix.runner == 'ubuntu-24.04-arm'
        shell: bash
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Verify toolchain
        shell: bash
        run: |
          set -euo pipefail
          node --version | grep -E '^v24\.'
          "$DIET_N8N_PYTHON_BIN" --version | grep -E '3\.(12|13)'
          "$DIET_N8N_PYTHON_BIN" -m pip --version
          "$DIET_N8N_PYTHON_BIN" -m venv --help >/dev/null
          uv --version

      - name: npm ci
        shell: bash
        env:
          npm_config_build_from_source: "false"
        run: npm ci

      - name: npm run build
        shell: bash
        run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.slug }}
          path: dist/
          retention-days: 7

  verify:
    name: verify (${{ matrix.slug }})
    needs: build
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: true
      matrix:
        include:
          - runner: ubuntu-latest
            diet_target: linux-x64
            slug: linux-x64
          - runner: ubuntu-24.04-arm
            diet_target: linux-arm64
            slug: linux-arm64
          - runner: windows-latest
            diet_target: win-x64
            slug: win-x64
          - runner: macos-26-intel
            diet_target: mac-x64
            slug: mac-x64
          - runner: macos-latest
            diet_target: mac-arm64
            slug: mac-arm64
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: actions/download-artifact@v4
        with:
          name: dist-${{ matrix.slug }}
          path: dist

      - name: Pack, install, and smoke-test
        shell: bash
        env:
          SLUG: ${{ matrix.slug }}
        run: |
          set -euo pipefail
          ROOT="$(pwd)"
          cd dist
          npm pack
          VER="$(node -p "require('./package.json').version")"
          PACKED="${ROOT}/diet-n8n-${VER}.tgz"
          mv "diet-n8n-${VER}.tgz" "$PACKED"
          cd ..
          mkdir smoke
          cd smoke
          npm init -y >/dev/null
          npm install "$PACKED"
          cd node_modules/diet-n8n
          npm start &
          PID=$!
          cleanup() {
            kill "$PID" 2>/dev/null || true
            wait "$PID" 2>/dev/null || true
          }
          trap cleanup EXIT
          HEALTHY=0
          for _ in $(seq 1 120); do
            if curl -fsS http://127.0.0.1:5678/healthz >/dev/null; then
              echo "n8n healthy on :5678"
              HEALTHY=1
              break
            fi
            sleep 5
          done
          cleanup
          trap - EXIT
          if [ "$HEALTHY" -ne 1 ]; then
            echo "n8n did not become healthy within timeout"
            exit 1
          fi
          FINAL="${ROOT}/diet-n8n-${VER}-${SLUG}.tgz"
          mv "$PACKED" "$FINAL"
          echo "PACKED_PATH=$FINAL" >> "$GITHUB_ENV"
          echo "PACKED_NAME=$(basename "$FINAL")" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.slug }}
          path: ${{ env.PACKED_PATH }}
          retention-days: 7

  release:
    name: release Nightly
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: package-*
          merge-multiple: true
          path: packages

      - name: Collect release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          shopt -s nullglob
          for tgz in packages/**/*.tgz packages/*.tgz; do
            cp "$tgz" release-assets/
          done
          ls -la release-assets/
          test "$(find release-assets -maxdepth 1 -name 'diet-n8n-*.tgz' | wc -l)" -eq 5

      - name: Move Nightly tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f Nightly "${GITHUB_SHA}"
          git push origin refs/tags/Nightly --force

      - name: Publish prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release delete Nightly -y 2>/dev/null || true
          gh release create Nightly release-assets/diet-n8n-*.tgz \
            --prerelease \
            --title "Nightly ($(date -u +%Y-%m-%d))" \
            --notes "Automated nightly build from ${GITHUB_SHA}"
