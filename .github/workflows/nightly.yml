name: Nightly Build

on:
  push:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'

concurrency:
  group: nightly
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-and-release:
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: linux-x64
            runner: ubuntu-latest
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
          - platform: win-x64
            runner: windows-latest
          - platform: macos-x64
            runner: macos-15-intel
          - platform: macos-arm64
            runner: macos-latest
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install build dependencies
        shell: bash
        run: |
          case "${{ runner.os }}" in
            Linux)
              sudo apt-get update
              sudo apt-get install -y file xz-utils python3 python3-venv curl jq
              ;;
            macOS)
              brew install coreutils jq xz file curl python@3.12
              gpath=$(command -v gsha256sum) && sudo ln -sf "$gpath" /usr/local/bin/sha256sum
              # node-gyp must not use Homebrew python@3.14 (no distutils); pin 3.12 for native modules
              PY312="$(brew --prefix python@3.12)/bin/python3.12"
              "$PY312" -m pip install --upgrade pip setuptools
              echo "PYTHON=$PY312" >> "$GITHUB_ENV"
              echo "npm_config_python=$PY312" >> "$GITHUB_ENV"
              ;;
            Windows)
              choco install busybox -y --no-progress
              # xz ships with Git for Windows (no Chocolatey xz package)
              echo "/usr/bin" >> "$GITHUB_PATH"
              ;;
          esac
          curl -fsSL https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          command -v xz >/dev/null || command -v file >/dev/null || { echo "xz or file missing on PATH"; exit 1; }

      - name: Install Node dependencies
        shell: bash
        run: npm ci

      - name: Build
        shell: bash
        run: bash build.sh --platform ${{ matrix.platform }}

      - name: Mutate and Pack
        id: pack
        shell: bash
        run: |
          OUT_DIR=$([ "${{ matrix.platform }}" = "linux-x64" ] && echo "dist" || echo "dist-${{ matrix.platform }}")
          cd "$OUT_DIR"
          jq '.name = "diet-n8n-${{ matrix.platform }}"' package.json > tmp.json && mv tmp.json package.json
          npm pack
          echo "out_dir=$OUT_DIR" >> "$GITHUB_OUTPUT"
          echo "tgz_path=$OUT_DIR/$(ls *.tgz | head -n 1)" >> "$GITHUB_OUTPUT"

      - name: Validate
        timeout-minutes: 10
        shell: bash
        run: |
          VALID_DIR=$(mktemp -d)
          cd "$VALID_DIR"
          npm init -y >/dev/null
          npm install "$GITHUB_WORKSPACE/${{ steps.pack.outputs.tgz_path }}"
          cp "$GITHUB_WORKSPACE/${{ steps.pack.outputs.out_dir }}/minimal.env" .
          PKG_DIR=$(find node_modules -maxdepth 1 -type d -name 'diet-n8n-*' | head -1)
          N8N_BIN="$PKG_DIR/node_modules/n8n/bin/n8n"
          test -f "$N8N_BIN" || { echo "n8n missing at $N8N_BIN"; ls -la "$PKG_DIR" 2>/dev/null || true; exit 1; }
          export N8N_USER_FOLDER=$PWD
          npx --yes dotenv-cli -e minimal.env -- node "$N8N_BIN" &
          N8N_PID=$!
          for i in $(seq 1 90); do
            curl -sf http://localhost:5678/healthz && echo "VALIDATION PASSED" && kill "$N8N_PID" && exit 0
            sleep 2
          done
          kill "$N8N_PID" 2>/dev/null || true
          exit 1

      - name: Release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TGZ_PATH=${{ steps.pack.outputs.tgz_path }}
          if ! gh release view nightly >/dev/null 2>&1; then
            gh release create nightly --target ${{ github.sha }} --title "Nightly" --notes "Auto-generated nightly build"
          fi
          gh release upload nightly "$TGZ_PATH" --clobber

  release-audit:
    needs: [build-and-release]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Audit Release Assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          PLATFORMS=("linux-x64" "linux-arm64" "win-x64" "macos-x64" "macos-arm64")
          echo "Fetching assets for nightly release..."
          ASSETS=$(gh release view nightly --json assets --jq '.assets[] | .name' 2>/dev/null || echo "")
          [ -z "$ASSETS" ] && echo "No assets found." && exit 1

          VALID_ASSETS=()
          for asset in $ASSETS; do
            matched=false
            for p in "${PLATFORMS[@]}"; do
              [[ $asset == diet-n8n-$p-*.tgz ]] && matched=true && break
            done
            $matched && VALID_ASSETS+=("$asset") || { echo "Invalid asset: $asset"; exit 1; }
          done

          count=${#VALID_ASSETS[@]}
          echo "Found $count valid assets."
          result=${{ needs.build-and-release.result }}

          if [ "$result" = "success" ]; then
            [ "$count" -eq 5 ] || { echo "Expected 5, found $count."; exit 1; }
          else
            [ "$count" -gt 0 ] || { echo "All builds failed."; exit 1; }
            [ "$count" -lt 5 ] || { echo "All 5 present despite failure."; exit 1; }
          fi

          for p in "${PLATFORMS[@]}"; do
            found=false
            for va in "${VALID_ASSETS[@]}"; do
              [[ $va == diet-n8n-$p-* ]] && found=true && break
            done
            $found && echo "  $p: Present" || echo "  $p: MISSING"
          done
          echo "Release audit passed."
